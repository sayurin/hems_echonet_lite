name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install bump-my-version
        run: python -m pip install bump-my-version==1.2.4

      - name: Bump version
        id: bump_version
        run: |
          bump-my-version bump "${{ inputs.bump }}"
          NEW_VERSION="$(python -c 'import json; print(json.load(open("custom_components/echonet_lite/manifest.json", encoding="utf-8"))["version"])')"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ steps.bump_version.outputs.new_version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.bump_version.outputs.new_version }} already exists"
            exit 1
          fi

      - name: Commit and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .bumpversion.toml custom_components/echonet_lite/manifest.json
          git commit -m "Release v${{ steps.bump_version.outputs.new_version }}"
          git tag "v${{ steps.bump_version.outputs.new_version }}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD --tags

      - name: ZIP echonet_lite Dir
        run: |
          cd ${{ github.workspace }}/custom_components/echonet_lite
          zip echonet_lite.zip -r ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: "v${{ steps.bump_version.outputs.new_version }}"
          generate_release_notes: true
          prerelease: true
          files: ${{ github.workspace }}/custom_components/echonet_lite/echonet_lite.zip
